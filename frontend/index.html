<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Friends</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Pantalla de autenticación -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-mark">F</span>
        <h1>Friends</h1>
      </div>
      <p class="tagline">Habla con tu gente, donde sea.</p>

      <div class="tabs">
        <button class="tab active" data-tab="login">Entrar</button>
        <button class="tab" data-tab="register">Crear cuenta</button>
      </div>

      <form id="login-form" class="auth-form">
        <label>
          Usuario
          <input type="text" id="login-username" autocomplete="username" required />
        </label>
        <label>
          Contraseña
          <input type="password" id="login-password" autocomplete="current-password" required />
        </label>
        <p class="error" id="login-error"></p>
        <button type="submit" class="primary-btn">Entrar</button>
      </form>

      <form id="register-form" class="auth-form hidden">
        <label>
          Nombre para mostrar
          <input type="text" id="register-displayname" placeholder="Como te verán los demás" />
        </label>
        <label>
          Usuario
          <input type="text" id="register-username" autocomplete="username" required />
        </label>
        <label>
          Contraseña
          <input type="password" id="register-password" autocomplete="new-password" required />
        </label>
        <p class="error" id="register-error"></p>
        <button type="submit" class="primary-btn">Crear cuenta</button>
      </form>
    </div>
  </div>

  <!-- Pantalla principal de chat -->
  <div id="app-screen" class="screen hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="brand-mark small">F</span>
        <span class="me-name" id="me-name"></span>
        <button id="logout-btn" class="icon-btn" title="Salir" aria-label="Cerrar sesión">⏻</button>
      </div>
      <div class="contact-list" id="contact-list">
        <!-- contactos inyectados por JS -->
      </div>
    </aside>

    <main class="chat-area">
      <div id="chat-empty" class="chat-empty">
        <p>Elige a alguien de la lista para empezar a chatear.</p>
      </div>

      <div id="chat-active" class="chat-active hidden">
        <header class="chat-header">
          <button id="back-btn" class="icon-btn mobile-only" aria-label="Volver">←</button>
          <span class="chat-contact-name" id="chat-contact-name"></span>
          <span class="chat-status" id="chat-contact-status"></span>
        </header>

        <div class="messages" id="messages"></div>

        <div class="typing-indicator hidden" id="typing-indicator">escribiendo…</div>

        <form id="message-form" class="message-form">
          <input type="text" id="message-input" placeholder="Escribe un mensaje" autocomplete="off" />
          <button type="submit" class="send-btn" aria-label="Enviar">➤</button>
        </form>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
